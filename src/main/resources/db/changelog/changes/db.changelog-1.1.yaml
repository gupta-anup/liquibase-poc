databaseChangeLog:
  - changeSet:
      id: 2
      author: anup gupta
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)

  - changeSet:
      id: 3
      author: anup gupta
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role_id
                  type: BIGINT
